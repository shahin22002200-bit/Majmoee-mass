<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت مجموعه ماساژ</title>
    <!-- کتابخانه PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 10px;
        }
        .login-container {
            max-width: 360px;
            margin: 80px auto;
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #d4af37;
            text-align: center;
            box-shadow: 0 4px 15px rgba(212,175,55,0.1);
        }
        .login-container h2 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .input-group {
            margin-bottom: 12px;
            text-align: right;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 13px;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 5px;
            color: #fff;
            box-sizing: border-box;
            font-size: 14px;
        }
        .input-group input:focus {
            border-color: #d4af37;
            outline: none;
        }
        .btn {
            background: linear-gradient(45deg, #d4af37, #aa7c11);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
        }
        .btn:hover { opacity: 0.9; }
        .main-container {
            display: none;
            max-width: 1000px;
            margin: 0 auto;
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #d4af37;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .header h2 { color: #d4af37; margin: 0; font-size: 18px; }
        .btn-logout {
            background: #ff4d4d;
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 12px;
        }
        .form-inline {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            background: #252525;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .form-inline .input-group { margin-bottom: 0; }
        .form-inline .input-group input { padding: 8px; font-size: 13px; }
        .btn-add { margin-top: 10px; margin-bottom: 15px; }
        
        .table-responsive {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            background: #1a1a1a;
        }
        th, td {
            border: 1px solid #333;
            padding: 10px 8px;
            text-align: center;
        }
        th {
            background-color: #2d2d2d;
            color: #d4af37;
        }
        tr:nth-child(even) { background-color: #222; }
        .locked-row { background-color: #1b3a1b !important; color: #85e085; }
        
        .btn-settle {
            background: #2ed573;
            color: #000;
            border: none;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
        }
        .btn-settle:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        
        .footer-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn-pdf { background: linear-gradient(45deg, #1e90ff, #0066cc); color: white; }
        .btn-clear { background: #ff4757; color: white; }
    </style>
</head>
<body>

    <!-- فرم ورود دارک شیک -->
    <div id="loginSection" class="login-container">
        <h2>ورود به پنل مدیریت مجموعه 👑</h2>
        <div class="input-group">
            <label>نام کاربری:</label>
            <input type="text" id="username" placeholder="Arshaam">
        </div>
        <div class="input-group">
            <label>رمز عبور:</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn" onclick="checkLogin()">ورود</button>
    </div>

    <!-- بخش اصلی با همان تم اصیل -->
    <div id="mainSection" class="main-container">
        <div class="header">
            <h2>مدیریت و حسابداری مجموعه ماساژ ✨</h2>
            <button class="btn-logout" onclick="logout()">خروج</button>
        </div>

        <div class="form-inline">
            <div class="input-group">
                <label>نام ماسور:</label>
                <input type="text" id="masseurName">
            </div>
            <div class="input-group">
                <label>نوع ماساژ:</label>
                <input type="text" id="massageType">
            </div>
            <div class="input-group">
                <label>قیمت کل (تومان):</label>
                <input type="number" id="totalPrice" oninput="calculateShares()">
            </div>
            <div class="input-group">
                <label>سهم ماسور:</label>
                <input type="number" id="masseurShare">
            </div>
            <div class="input-group">
                <label>سهم مجموعه:</label>
                <input type="number" id="salonShare">
            </div>
            <div class="input-group">
                <label>مساعده:</label>
                <input type="number" id="advancePayment" value="0">
            </div>
            <div class="input-group">
                <label>بدهی قبلی:</label>
                <input type="number" id="previousDebt" value="0">
            </div>
        </div>
        
        <button class="btn btn-add" onclick="addRecord()">➕ ثبت در جدول</button>

        <div class="table-responsive" id="pdfContent">
            <table id="recordsTable">
                <thead>
                    <tr>
                        <th>نام ماسور</th>
                        <th>نوع ماساژ</th>
                        <th>قیمت کل</th>
                        <th>سهم ماسور</th>
                        <th>سهم مجموعه</th>
                        <th>مساعده</th>
                        <th>بدهی قبلی</th>
                        <th>وضعیت</th>
                        <th>عملیات</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="footer-actions">
            <button class="btn btn-pdf" onclick="exportToPDF()">📥 خروجی PDF</button>
            <button class="btn btn-clear" onclick="clearAllData()">🗑️ پاک کردن کل جدول</button>
        </div>
    </div>

    <script>
        function checkLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            if ((user === 'Arshaam' || user === 'shahin') && pass === '6660488928') {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('mainSection').style.display = 'block';
                loadData();
            } else { alert('خطا در ورود! ❌'); }
        }

        function logout() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('mainSection').style.display = 'none';
        }

        function calculateShares() {
            const total = parseFloat(document.getElementById('totalPrice').value) || 0;
            document.getElementById('masseurShare').value = total / 2;
            document.getElementById('salonShare').value = total / 2;
        }

        function addRecord() {
            const name = document.getElementById('masseurName').value;
            const type = document.getElementById('massageType').value;
            const total = document.getElementById('totalPrice').value;
            const masseur = document.getElementById('masseurShare').value;
            const salon = document.getElementById('salonShare').value;
            const advance = document.getElementById('advancePayment').value || 0;
            const debt = document.getElementById('previousDebt').value || 0;

            if(!name || !type || !total) { alert('فیلدها را کامل کنید! ⚠️'); return; }

            const record = { id: Date.now(), name, type, total, masseur, salon, advance, debt, settled: false };
            let records = JSON.parse(localStorage.getItem('massage_records')) || [];
            records.push(record);
            localStorage.setItem('massage_records', JSON.stringify(records));

            document.getElementById('masseurName').value = '';
            document.getElementById('massageType').value = '';
            document.getElementById('totalPrice').value = '';
            document.getElementById('masseurShare').value = '';
            document.getElementById('salonShare').value = '';
            document.getElementById('advancePayment').value = '0';
            document.getElementById('previousDebt').value = '0';
            loadData();
        }

        function loadData() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            let records = JSON.parse(localStorage.getItem('massage_records')) || [];

            records.forEach(rec => {
                const tr = document.createElement('tr');
                if(rec.settled) tr.className = 'locked-row';
                tr.innerHTML = `
                    <td>${rec.name}</td>
                    <td>${rec.type}</td>
                    <td>${Number(rec.total).toLocaleString()}</td>
                    <td>${Number(rec.masseur).toLocaleString()}</td>
                    <td>${Number(rec.salon).toLocaleString()}</td>
                    <td>${Number(rec.advance).toLocaleString()}</td>
                    <td>${Number(rec.debt).toLocaleString()}</td>
                    <td>${rec.settled ? '✅ تسویه' : '⏳ در جریان'}</td>
                    <td><button class="btn-settle" onclick="settleRow(${rec.id})" ${rec.settled ? 'disabled' : ''}>تسویه</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function settleRow(id) {
            let records = JSON.parse(localStorage.getItem('massage_records')) || [];
            records = records.map(rec => { if(rec.id === id) rec.settled = true; return rec; });
            localStorage.setItem('massage_records', JSON.stringify(records));
            loadData();
        }

        function exportToPDF() {
            const element = document.getElementById('pdfContent');
            html2pdf().set({ margin: 5, filename: 'گزارش_ماساژ.pdf', html2canvas: { scale: 2 }, jsPDF: { format: 'a4', orientation: 'landscape' } }).from(element).save();
        }

        function clearAllData() {
            if(confirm('کل جدول پاک شود؟')) { localStorage.removeItem('massage_records'); loadData(); }
        }
    </script>
</body>
    </html>
